<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ita’s Arborist Garden – Lesson</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="/public/favicon.ico" />
  <link rel="manifest" href="/public/manifest.json" />
  <link rel="stylesheet" href="/assets/css/style.css" />

  <style>
    body {
      background: url("/assets/img/ita-water.jpg") center/cover no-repeat fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 107, 156, 0.35), transparent 60%),
        radial-gradient(circle at 85% 80%, rgba(255, 179, 71, 0.35), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(76, 175, 80, 0.25), transparent 60%),
        rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px) saturate(1.2);
      z-index: 0;
    }

    .app-shell {
      backdrop-filter: blur(14px) saturate(1.25);
      background: rgba(10, 20, 15, 0.78);
      padding-top: 32px;
      padding-bottom: 32px;
      border-radius: 24px;
    }

    .garden-bloom {
      background:
        radial-gradient(circle at 30% 20%, #ff6b9c, transparent 60%),
        radial-gradient(circle at 70% 80%, #ffb347, transparent 60%);
      box-shadow: 0 0 16px rgba(255, 107, 156, 0.7);
    }

    #lesson-title {
      background: linear-gradient(135deg, #ff6b9c, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <div class="brand-icon">🍊</div>
        <div>
          <div class="brand-text-main" data-i18n="app_title">Ita’s Arborist Garden</div>
          <div class="brand-text-sub" data-i18n="app_subtitle">
            Short lessons, gentle quizzes, and a growing forest of knowledge.
          </div>
        </div>
      </div>

      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
    </header>

    <main class="app-content">
      <section class="card">
        <div class="card-inner">
          <div class="card-title">
            <span id="lesson-title">Lesson title</span>
            <span class="card-pill" id="lesson-category-pill">🌳 Category</span>
          </div>

          <div class="card-subtitle" id="lesson-category-sub"></div>

          <div class="lesson-text">
            <p id="lesson-text"></p>
            <p class="lesson-highlight" id="lesson-highlight"></p>
            <p class="lesson-tip" id="lesson-tip" style="font-size:12px; color:#c7f7d0; margin-top:6px;"></p>
          </div>

          <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0;" />

          <form class="quiz" id="lesson-quiz-form">
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-options" id="quiz-options"></div>

            <div class="quiz-actions">
              <button type="submit" class="btn-primary" id="quiz-submit">✓ Quiz</button>
              <div class="quiz-feedback" id="quiz-feedback"></div>
            </div>
          </form>
        </div>
      </section>

      <aside class="card">
        <div class="card-inner progress-card">
          <div class="progress-header">
            <span id="progress-label">Lesson progress</span>
            <span id="progress-value"></span>
          </div>

          <div class="progress-badge">
            🌱 <span id="progress-badge-text">Growing knowledge</span>
          </div>

          <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progress-bar-inner"></div>
          </div>

          <div class="garden-visual">
            <div class="garden-stem"><div class="garden-bloom"></div></div>
            <div class="garden-stem"><div class="garden-bloom"></div></div>
            <div class="garden-stem"><div class="garden-bloom"></div></div>
          </div>

          <div style="margin-top:12px; display:flex; gap:8px; justify-content:space-between;">
            <button type="button" class="btn-primary" id="prev-lesson" style="flex:1; font-size:11px;">← Previous</button>
            <button type="button" class="btn-primary" id="next-lesson" style="flex:1; font-size:11px;">Next →</button>
          </div>
        </div>
      </aside>
    </main>

    <footer class="app-footer">
      <span data-i18n="footer_left">Made with care for Ita’s arborist journey.</span>
      <a href="/pages/index.html">Back to garden</a>
    </footer>
  </div>

  <script src="/assets/js/language.js"></script>

  <!-- ALL LESSON DATA FILES -->
  <script src="/assets/js/lesson-data.js"></script>
  <script src="/assets/js/lesson-data2.js"></script>
  <script src="/assets/js/lesson-data3.js"></script>

  <!-- LESSON ENGINE -->
  <script src="/assets/js/lesson-page.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/public/service-worker.js").catch(() => {});
    }
  </script>
</body>
</html>
