<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title data-i18n="sg_title">Arborist Study Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" href="/public/favicon.ico" />
  <link rel="stylesheet" href="/assets/css/style.css" />

  <style>
    body {
      background: url("/assets/img/ita-index.jpg") center/cover fixed no-repeat;
      position: relative;
      margin: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 107, 156, 0.35), transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(255, 179, 71, 0.35), transparent 60%),
        rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(3px);
      z-index: 0;
    }

    .study-shell {
      display: flex;
      backdrop-filter: blur(14px) saturate(1.25);
      background: rgba(10, 20, 15, 0.78);
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      width: 260px;
      padding: 20px;
      border-right: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #ffb347;
    }

    .nav-section {
      margin-bottom: 18px;
    }

    .nav-section button {
      width: 100%;
      background: none;
      border: none;
      color: #ff6b9c;
      font-size: 15px;
      text-align: left;
      padding: 6px 0;
      cursor: pointer;
      font-weight: 600;
    }

    .nav-sub {
      margin-left: 12px;
      margin-top: 6px;
    }

    .nav-sub button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #d7e7dd;
      text-align: left;
      padding: 4px 0;
      font-size: 14px;
      cursor: pointer;
    }

    .nav-sub button:hover {
      color: #ffb347;
    }

    .content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .content h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #ff6b9c, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .content-section {
      margin-bottom: 40px;
    }

    .content p, .content li {
      color: #d7e7dd;
      line-height: 1.6;
      font-size: 15px;
    }

    .glossary-entry {
      margin-bottom: 10px;
    }

    .glossary-term {
      font-weight: 600;
      color: #ffb347;
    }

    .quiz-question {
      margin-bottom: 16px;
    }

    .quiz-option {
      display: block;
      margin: 4px 0;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.03);
      color: #d7e7dd;
      cursor: pointer;
      font-size: 14px;
    }

    .quiz-option.correct {
      border-color: #7bd88f;
      background: rgba(123,216,143,0.12);
    }

    .quiz-option.incorrect {
      border-color: #ff6b9c;
      background: rgba(255,107,156,0.12);
    }
  </style>
</head>

<body>
  <div class="study-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h2 data-i18n="sg_nav">Study Guide Navigation</h2>

      <div class="nav-section">
        <button>🌱 Tree Biology</button>
        <div class="nav-sub">
          <button data-module="tree-structure">Tree Structure</button>
          <button data-module="tree-growth">Growth & Physiology</button>
          <button data-module="tree-health">Tree Health</button>
        </div>
      </div>

      <div class="nav-section">
        <button>✂️ Pruning</button>
        <div class="nav-sub">
          <button data-module="pruning-types">Types of Pruning</button>
          <button data-module="pruning-techniques">Cutting Techniques</button>
          <button data-module="pruning-timing">Timing</button>
        </div>
      </div>

      <!-- (rest of sections will map to modules later) -->
    </aside>

    <!-- CONTENT -->
    <main class="content">
      <h1 data-i18n="sg_header">Arborist Certification Study Guide</h1>
      <div id="module-content">
        <p>Select a topic from the left to open a full explanation, glossary, and quiz for that module.</p>
      </div>
    </main>
  </div>

  <script src="/assets/js/language.js"></script>
  <script src="/assets/js/modules/tree-structure.js"></script>
  <script src="/assets/js/study-guide.js"></script>
</body>
</html>
